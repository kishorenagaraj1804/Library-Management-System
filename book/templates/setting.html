{% extends 'base.html' %}
{% load static %}

{% block title %}
Settings
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'setting.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <h2>⚙ Settings</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter Username" required>
        </div>

        <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="current_password" name="current_password" placeholder="Enter Current Password" required>
            <span class="eye-icon" onclick="eye('current_password')">👁</span>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="new_password" name="new_password" placeholder="Enter New Password" required>
            <span class="eye-icon" onclick="eye('new_password')">👁</span>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm New Password" required>
            <span class="eye-icon" onclick="eye('confirm_password')">👁</span>
        </div>

        <hr>

        {% if error %}
            <p style="color:red">{{ error }}</p>
        {% endif %}

        {% if success %}
            <p style="color:green">{{ success }}</p>
        {% endif %}

        <div class="form-group">
            <label>
                <input type="checkbox" id="darkMode">
                Enable Dark Mode
            </label>
        </div>

        <button type="submit" class="save-btn">
            Save Changes
        </button>

    </form>

</div>

<script>
function eye(id){
    const password = document.getElementById(id);

    if(password.type === "password"){
        password.type = "text";
    } else {
        password.type = "password";
    }
}
document.addEventListener("DOMContentLoaded", function(){

    const checkbox = document.getElementById("darkMode");

    if(!checkbox) return;

    function applyTheme(){
        document.body.classList.toggle("dark-mode", checkbox.checked);
        localStorage.setItem("theme", checkbox.checked ? "dark" : "light");
    }

    checkbox.addEventListener("change", applyTheme);

    // load saved theme
    if(localStorage.getItem("theme") === "dark"){
        checkbox.checked = true;
    }

    applyTheme();

});

</script>

{% endblock %}
