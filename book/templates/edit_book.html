{% extends 'base.html' %}
{% load static %}

{% block title %}
Edit Book
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'edit_book.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <h2>Edit Book</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Book Name</label>
        <input
            type="text"
            name="book_name"
            value="{{ book.book_name }}"
            placeholder="Enter Book Name"
            required
        >

        <label>Author</label>
        <input
            type="text"
            name="author"
            value="{{ book.author }}"
            placeholder="Enter Author Name"
            required
        >

        <label>Category</label>
        <input
            type="text"
            name="category"
            value="{{ book.category }}"
            placeholder="Enter Category"
            required
        >

        <label>Quantity</label>
        <input
            type="number"
            name="quantity"
            value="{{ book.quantity }}"
            min="1"
            required
        >

        <label>Status</label>

        <select name="status" required>

            <option value="Available"
                {% if book.status == "Available" %}selected{% endif %}>
                Available
            </option>

            <option value="Issued"
                {% if book.status == "Issued" %}selected{% endif %}>
                Issued
            </option>

        </select>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

{% endblock %}
