{% extends 'base.html' %}

{% load static %}

{% block title %}
Add Book
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'add_book.css' %}">


{% endblock %}

{% block content %}

<div class="container">

    <h2>Add New Book</h2>

    <form method="POST">
        {% csrf_token %}

        <label for="book_name">Book Name</label>
        <input type="text" id="book_name" name="book_name" placeholder="Enter Book Name" required>

        <label for="author">Author Name</label>
        <input type="text" id="author" name="author" placeholder="Enter Author Name" required>

        <label for="category">Category</label>
        <input type="text" id="category" name="category" placeholder="Enter Category" required>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" placeholder="Enter Quantity" min="1" required>

        <label for="status">Status</label>
        <select id="status" name="status">
            <option value="Available">Available</option>
            <option value="Issued">Issued</option>
        </select>

        <button type="submit">Add Book</button>
    </form>

</div>

{% endblock %}
